name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Build Docker image
        run: |
          docker build -t webapp-flask -f ./app/Dockerfile ./app
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Push to Docker Hub
        run: |
          docker tag webapp-flask ${{ secrets.DOCKER_USERNAME }}/webapp-flask:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/webapp-flask:latest
